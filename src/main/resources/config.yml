# Плейсхолдеры
# - %windesign_bracketscolor% - цвет скобки
# - %windesign_leftbrackets% - левая скобка
# - %windesign_rightbrackets% - правая скобка
# - %windesign_prefixcolor% - цвет префикса
# - %windesign_prefix% - заменится на установленный игроком префикс
# - %windesign_tabprefixcolor% - цвет префикса + ⚡
# - %windesign_color% - цвет ника
# - %windesign_tagcolor% - цвет тега
# - %windesign_tag% - тег

# Команды плагина:
# /windesign - главное меню (алиасы: /prefix, /tag, /brackets, /namecolor)
# /prefix - префикс (select <id>, color select <id>, del)
# /brackets - скобки (select <id>, color select <id>, buy <id>, del)
# /tag - тег (select <id>, color select <id>, buy <id>, del)
# /namecolor - цвет ника (select <id>, del)

